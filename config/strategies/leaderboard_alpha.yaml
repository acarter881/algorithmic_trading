# Leaderboard Alpha strategy configuration.

leaderboard_alpha:
  min_edge_after_fees_cents: 3
  elo_shift_threshold: 3
  rank_spread_change_threshold: 2
  time_decay_acceleration_hours: 24
  max_position_per_contract: 100.00
  max_position_per_event: 250.00
  preliminary_model_discount: 0.30
  # 0.90 prevents false positives like gemini-2.5-pro matching gemini-3-pro
  # (which scores 0.85).  All legitimate matches are exact (1.0).
  fuzzy_match_threshold: 0.90
  target_series:
    - KXTOPMODEL
    - KXLLM1
  mapping_validation_top_n: 20

  # Manual ticker overrides: Arena name → Kalshi ticker (checked before
  # fuzzy matching).  The startup mapping report prints copy-paste YAML
  # for any unresolved entries.
  model_ticker_overrides: {}
  #   "grok-4.1": "KXTOPMODEL-26MAR31-GROK"

  org_ticker_overrides: {}
  #   "xAI": "KXLLM1-26MAR07-XAI"
  #   "Google": "KXLLM1-26MAR07-GOOG"

  # Aliases to normalize Arena names before matching.
  # Built-in org aliases (Anthropic→Claude, Google→Gemini, etc.) are
  # applied automatically — only add entries here to override or extend.
  model_aliases: {}
  #   "GPT5": "GPT-5"
  org_aliases: {}
  #   "Google DeepMind": "Google"
